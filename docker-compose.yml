name: site-herbert

services:
  # ----------------------------------------------------------------
  # dev   :  hot-reload Vite. Use `docker compose --profile dev up`.
  # ----------------------------------------------------------------
  dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    image: site-herbert:dev
    container_name: site-herbert-dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app:delegated
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  # ----------------------------------------------------------------
  # prod  :  hardened nginx serving the static build.
  #          `docker compose --profile prod up -d --build`
  # ----------------------------------------------------------------
  prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod
    image: site-herbert:prod
    container_name: site-herbert-prod
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
