<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f7fb" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Pre-React theme bootstrap. Prevents flash-of-wrong-theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('guedeslab.theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || (t == null && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {
          /* localStorage / matchMedia blocked - default to light */
        }
      })();
    </script>

    <title>GuedesLab — Immunology · Immunotherapy · Biotechnology</title>
    <meta
      name="description"
      content="Research lab led by Dr. Herbert Guedes. Immunology, cancer immunotherapy and biotechnology in health. INCA · FIOCRUZ."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://guedeslab.net/" />
    <link rel="alternate" hreflang="pt-BR" href="https://guedeslab.net/?lang=pt" />
    <link rel="alternate" hreflang="en" href="https://guedeslab.net/?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://guedeslab.net/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />

    />
