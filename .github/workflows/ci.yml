name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # Quality gate: install, typecheck (via build), lint, test
  # ============================================================
  quality:
    name: Lint • Test • Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --reporter=default --reporter=junit --outputFile=./junit.xml
        continue-on-error: false

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # ============================================================
  # Container build (only on main / pull_request)
  # ============================================================
  docker:
    name: Docker build (prod target)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: false
          tags: site-herbert:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
